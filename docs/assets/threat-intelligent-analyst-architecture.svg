<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="2160" viewBox="0 0 1800 2160">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#202124"/></marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill:#111; }
      .lane { fill:#fff; stroke:#222; stroke-width:2; }
      .lane-title { font:700 22px Arial, sans-serif; fill:#111; }
      .box { fill:#edf5ff; stroke:#222; stroke-width:2; rx:8; }
      .guard { fill:#fff5d6; stroke:#222; stroke-width:2; }
      .success { fill:#eef9ee; stroke:#222; stroke-width:2; rx:8; }
      .terminal { fill:#fff; stroke:#222; stroke-width:2; rx:28; }
      .shared { fill:#fafafa; stroke:#222; stroke-width:2; stroke-dasharray:8 6; rx:8; }
      .label { font: 18px Arial, sans-serif; fill:#111; text-anchor:middle; }
      .small { font: 15px Arial, sans-serif; fill:#111; text-anchor:middle; }
      .note { font: 14px Arial, sans-serif; fill:#333; }
      .arrow { stroke:#202124; stroke-width:2.2; fill:none; marker-end:url(#arrow); }
      .dashed { stroke:#202124; stroke-width:2; fill:none; stroke-dasharray:7 6; marker-end:url(#arrow); }
    </style>
  </defs>
  <rect width="1800" height="2160" fill="#fff"/>
  <text x="900" y="55" class="title" text-anchor="middle">Threat Intelligent Analyst - Runtime Architecture</text>

  <rect x="45" y="90" width="1110" height="1990" class="lane"/>
  <text x="75" y="125" class="lane-title">Web chat: full conversational investigation</text>
  <rect x="1190" y="90" width="565" height="1990" class="lane"/>
  <text x="1220" y="125" class="lane-title">MCP: explicit bounded tool execution</text>

  <!-- Web conversation path -->
  <rect x="425" y="155" width="340" height="52" class="terminal"/><text x="595" y="187" class="label">SOC analyst</text>
  <path d="M595 207 L595 235" class="arrow"/>
  <rect x="365" y="245" width="460" height="82" class="box"/><text x="595" y="277" class="label"><tspan x="595">FastAPI + Jinja2 / HTMX chat</tspan><tspan x="595" dy="24">session-ID cookie</tspan></text>
  <path d="M595 327 L595 355" class="arrow"/>
  <rect x="365" y="365" width="460" height="82" class="box"/><text x="595" y="397" class="label"><tspan x="595">LangGraph initializes state</tspan><tspan x="595" dy="24">and process-local session memory</tspan></text>
  <path d="M595 447 L595 475" class="arrow"/>
  <polygon points="595,475 745,545 595,615 445,545" class="guard"/><text x="595" y="539" class="label"><tspan x="595">Direct prompt-injection</tspan><tspan x="595" dy="22">policy match?</tspan></text>
  <path d="M745 545 L875 545" class="arrow"/><text x="790" y="530" class="small">Yes</text>
  <rect x="885" y="505" width="235" height="80" class="box"/><text x="1002" y="535" class="small"><tspan x="1002">Refuse request</tspan><tspan x="1002" dy="20">direct_prompt_injection</tspan></text>
  <path d="M1120 545 L1130 545" class="arrow"/><rect x="1138" y="520" width="1" height="1" fill="none"/>
  <text x="790" y="603" class="small">No</text><path d="M595 615 L595 650" class="arrow"/>
  <rect x="365" y="660" width="460" height="72" class="box"/><text x="595" y="690" class="label"><tspan x="595">Local fine-tuned Prompt Guard</tspan><tspan x="595" dy="22">semantic classification</tspan></text>
  <path d="M595 732 L595 760" class="arrow"/>
  <polygon points="595,760 735,825 595,890 455,825" class="guard"/><text x="595" y="819" class="label"><tspan x="595">High injection risk?</tspan></text>
  <path d="M735 825 L875 825" class="arrow"/><text x="785" y="810" class="small">Yes</text>
  <rect x="885" y="785" width="235" height="80" class="box"/><text x="1002" y="815" class="small"><tspan x="1002">Refuse request</tspan><tspan x="1002" dy="20">semantic_prompt_injection</tspan></text>
  <text x="785" y="878" class="small">No</text><path d="M595 890 L595 925" class="arrow"/>
  <rect x="365" y="935" width="460" height="82" class="box"/><text x="595" y="965" class="label"><tspan x="595">Hybrid intent router</tspan><tspan x="595" dy="22">Rules for clear entities; Groq for ambiguity</tspan></text>
  <path d="M595 1017 L595 1045" class="arrow"/>
  <rect x="365" y="1055" width="460" height="82" class="box"/><text x="595" y="1085" class="label"><tspan x="595">Context resolution</tspan><tspan x="595" dy="22">Rules first; bounded Groq fallback</tspan></text>
  <path d="M595 1137 L595 1165" class="arrow"/>
  <rect x="365" y="1175" width="460" height="82" class="box"/><text x="595" y="1205" class="label"><tspan x="595">Coordinator task delegation</tspan><tspan x="595" dy="22">specialist-to-tool allowlist</tspan></text>
  <path d="M595 1257 L595 1285" class="arrow"/>
  <rect x="365" y="1295" width="460" height="62" class="box"/><text x="595" y="1333" class="label">Typed investigation tool</text>

  <!-- Shared provider core -->
  <rect x="860" y="1210" width="255" height="340" class="shared"/>
  <text x="987" y="1240" class="small"><tspan x="987">Shared Composite</tspan><tspan x="987" dy="18">ThreatIntelProvider</tspan></text>
  <rect x="885" y="1270" width="205" height="44" class="box"/><text x="987" y="1298" class="small">TTL cache + bounded concurrency</text>
  <rect x="885" y="1330" width="92" height="38" class="box"/><text x="931" y="1355" class="small">VirusTotal</text>
  <rect x="995" y="1330" width="92" height="38" class="box"/><text x="1041" y="1355" class="small">AbuseIPDB</text>
  <rect x="885" y="1382" width="92" height="38" class="box"/><text x="931" y="1407" class="small">OTX</text>
  <rect x="995" y="1382" width="92" height="38" class="box"/><text x="1041" y="1407" class="small">NVD</text>
  <rect x="885" y="1434" width="202" height="38" class="box"/><text x="987" y="1459" class="small">MITRE ATT&amp;CK STIX</text>
  <text x="987" y="1495" class="small"><tspan x="987">IOC: VT + AbuseIPDB + OTX</tspan><tspan x="987" dy="17">Actor/TTP: MITRE + OTX</tspan><tspan x="987" dy="17">Exposure: NVD; Pivot/ASN: VT</tspan></text>
  <path d="M825 1326 L860 1326" class="arrow"/>
  <path d="M860 1525 L825 1525" class="arrow"/>
  <rect x="365" y="1490" width="460" height="72" class="box"/><text x="595" y="1520" class="label"><tspan x="595">Retrieved-data guard</tspan><tspan x="595" dy="22">signatures + optional local Prompt Guard</tspan></text>
  <path d="M595 1562 L595 1590" class="arrow"/>
  <rect x="365" y="1600" width="460" height="56" class="box"/><text x="595" y="1635" class="label">Evidence ledger</text>
  <path d="M595 1656 L595 1680" class="arrow"/>
  <rect x="365" y="1690" width="460" height="62" class="success"/><text x="595" y="1717" class="label"><tspan x="595">Deterministic weighted confidence</tspan></text>
  <path d="M595 1752 L595 1776" class="arrow"/>
  <rect x="365" y="1786" width="460" height="62" class="success"/><text x="595" y="1813" class="label"><tspan x="595">Grounded response</tspan><tspan x="595" dy="20">Groq narrative or deterministic fallback</tspan></text>
  <path d="M595 1848 L595 1870" class="arrow"/>
  <rect x="365" y="1880" width="460" height="62" class="box"/><text x="595" y="1907" class="label"><tspan x="595">Update memory + secret-free trace</tspan></text>
  <path d="M595 1942 L595 1962" class="arrow"/>
  <rect x="300" y="1972" width="590" height="72" class="terminal"/><text x="595" y="2000" class="label"><tspan x="595">Analyst response</tspan><tspan x="595" dy="22">finding, evidence, sources, confidence, limitations, next step</tspan></text>

  <!-- MCP path -->
  <rect x="1295" y="180" width="350" height="52" class="terminal"/><text x="1470" y="212" class="label">MCP client</text>
  <path d="M1470 232 L1470 255" class="arrow"/>
  <rect x="1295" y="265" width="350" height="58" class="box"/><text x="1470" y="301" class="label">FastMCP server</text>
  <path d="M1470 323 L1470 348" class="arrow"/>
  <rect x="1295" y="358" width="350" height="82" class="box"/><text x="1470" y="388" class="label"><tspan x="1470">Typed input validation</tspan><tspan x="1470" dy="22">IP, domain, hash, actor, product, version</tspan></text>
  <path d="M1470 440 L1470 465" class="arrow"/>
  <rect x="1295" y="475" width="350" height="82" class="box"/><text x="1470" y="505" class="label"><tspan x="1470">Explicit MCP tool</tspan><tspan x="1470" dy="22">IOC, pivot, ASN, actor/TTP, exposure</tspan></text>
  <path d="M1470 557 L1470 582" class="arrow"/>
  <rect x="1295" y="592" width="350" height="62" class="box"/><text x="1470" y="630" class="label">Typed investigation tool</text>
  <path d="M1295 623 L1115 623 L1115 1270" class="dashed"/>
  <path d="M1115 1525 L1295 1525 L1295 720" class="dashed"/>
  <rect x="1295" y="730" width="350" height="72" class="box"/><text x="1470" y="760" class="label"><tspan x="1470">Retrieved-data guard</tspan><tspan x="1470" dy="22">signatures + optional local Prompt Guard</tspan></text>
  <path d="M1470 802 L1470 827" class="arrow"/>
  <rect x="1295" y="837" width="350" height="70" class="terminal"/><text x="1470" y="866" class="label"><tspan x="1470">Typed ToolResult</tspan><tspan x="1470" dy="22">raw provider payload excluded</tspan></text>
  <text x="1470" y="960" class="note" text-anchor="middle"><tspan x="1470">MCP does not use LangGraph, chat session memory,</tspan><tspan x="1470" dy="19">intent routing, Groq planning, confidence scoring,</tspan><tspan x="1470" dy="19">or grounded response composition.</tspan></text>

  <rect x="45" y="2110" width="1710" height="38" class="shared"/><text x="900" y="2135" class="small">Shared controls: typed failures, API timeouts, tool and LLM budgets, provider cache, /health, /ready</text>
</svg>
